<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Canon iP100 Setup Sticker</title>
<style>
  body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: white;
  }
  .sticker {
    border: 2px solid black;
    border-radius: 12px;
    padding: 16px 20px 12px 20px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 200px;
  }
  .sticker img {
    width: 180px;
    height: 180px;
  }
  .label {
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: bold;
    text-align: center;
    letter-spacing: 0.03em;
  }
  .sub {
    font-family: Arial, sans-serif;
    font-size: 10px;
    color: #444;
    text-align: center;
  }
  @media print {
    body { height: auto; margin: 40px; }
  }
</style>
</head>
<body>
  <div class="sticker">
    <img src="qr.png" alt="QR Code">
    <div class="label">Canon iP100 Setup Guide</div>
    <div class="sub">github.com/BaoPSU/canon-pixma-ip100-linux</div>
  </div>
</body>
</html>
